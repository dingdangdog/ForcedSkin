<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ForcedSkin</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <div class="header">
        <img src="../LOGO.webp" alt="ForcedSkin" class="header-logo" />
        <h1>ForcedSkin</h1>
        <div id="userBadge" class="user-badge hidden">
          <span id="userName"></span>
          <button id="logoutBtn" class="logout-btn" data-i18n-title="logoutTitle">✕</button>
        </div>
      </div>

      <!-- 主题模式选择 -->
      <div class="options">
        <label class="option">
          <input type="radio" name="themeMode" value="light" />
          <div class="option-body">
            <span class="option-label" data-i18n="optionLight"></span>
            <span id="lightThemeName" class="option-sub"></span>
          </div>
        </label>
        <label class="option">
          <input type="radio" name="themeMode" value="dark" />
          <div class="option-body">
            <span class="option-label" data-i18n="optionDark"></span>
            <span id="darkThemeName" class="option-sub"></span>
          </div>
        </label>
        <label class="option">
          <input type="radio" name="themeMode" value="off" />
          <div class="option-body">
            <span class="option-label" data-i18n="optionOff"></span>
            <span class="option-sub" data-i18n="optionOffSub"></span>
          </div>
        </label>
      </div>

      <div id="lightThemeStrip" class="theme-strip hidden">
        <p class="theme-strip-label" data-i18n="pickLightTheme"></p>
        <div id="lightThemeChips" class="theme-chips" role="listbox" aria-label="Light themes"></div>
      </div>
      <div id="darkThemeStrip" class="theme-strip hidden">
        <p class="theme-strip-label" data-i18n="pickDarkTheme"></p>
        <div id="darkThemeChips" class="theme-chips" role="listbox" aria-label="Dark themes"></div>
      </div>

      <!-- 白名单控制 -->
      <section class="whitelist-panel">
        <p class="field-label" data-i18n="currentSite"></p>
        <p id="siteHostText" class="site-host">-</p>
        <p id="whitelistStateText" class="whitelist-state">-</p>
        <div class="button-row">
          <button id="addWhitelistBtn" class="save-btn" type="button" data-i18n="addWhitelist"></button>
          <button id="removeWhitelistBtn" class="save-btn danger" type="button" data-i18n="removeWhitelist"></button>
        </div>
      </section>

      <p id="statusText" class="status"></p>

      <!-- 登录区块 -->
      <section id="loginSection" class="login-section hidden">
        <div class="section-divider"></div>
        <p class="field-label" data-i18n="loginPrompt"></p>
        <div class="login-form">
          <button id="loginBtn" class="save-btn primary-btn" type="button" data-i18n="loginBtnOauth"></button>
          <p id="loginError" class="login-error hidden"></p>
        </div>
      </section>

      <!-- 已登录：主题同步状态 -->
      <section id="syncSection" class="sync-section hidden">
        <div class="section-divider"></div>
        <p class="field-label" data-i18n="accountThemes"></p>
        <div class="theme-sync-row">
          <div class="theme-sync-item">
            <span class="theme-sync-label" data-i18n="syncLight"></span>
            <span id="syncLightName" class="theme-sync-name">—</span>
          </div>
          <div class="theme-sync-item">
            <span class="theme-sync-label" data-i18n="syncDark"></span>
            <span id="syncDarkName" class="theme-sync-name">—</span>
          </div>
        </div>
        <button id="syncBtn" class="save-btn" type="button" style="margin-top:8px" data-i18n="syncBtn"></button>
      </section>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
