<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>ForcedSkin</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <div class="header">
        <img src="../LOGO.webp" alt="ForcedSkin" class="header-logo" />
        <h1>ForcedSkin</h1>
        <div id="userBadge" class="user-badge hidden">
          <span id="userName"></span>
          <button id="logoutBtn" class="logout-btn" title="退出登录">✕</button>
        </div>
      </div>

      <!-- 主题模式选择 -->
      <div class="options">
        <label class="option">
          <input type="radio" name="themeMode" value="light" />
          <div class="option-body">
            <span class="option-label">亮色主题</span>
            <span id="lightThemeName" class="option-sub"></span>
          </div>
        </label>
        <label class="option">
          <input type="radio" name="themeMode" value="dark" />
          <div class="option-body">
            <span class="option-label">暗色主题</span>
            <span id="darkThemeName" class="option-sub"></span>
          </div>
        </label>
        <label class="option">
          <input type="radio" name="themeMode" value="off" />
          <div class="option-body">
            <span class="option-label">不修改</span>
            <span class="option-sub">保持网站原样</span>
          </div>
        </label>
      </div>

      <!-- 白名单控制 -->
      <section class="whitelist-panel">
        <p class="field-label">当前网站</p>
        <p id="siteHostText" class="site-host">-</p>
        <p id="whitelistStateText" class="whitelist-state">白名单状态：-</p>
        <div class="button-row">
          <button id="addWhitelistBtn" class="save-btn" type="button">加入白名单</button>
          <button id="removeWhitelistBtn" class="save-btn danger" type="button">移除白名单</button>
        </div>
      </section>

      <p id="statusText" class="status"></p>

      <!-- 登录区块 -->
      <section id="loginSection" class="login-section hidden">
        <div class="section-divider"></div>
        <p class="field-label">登录 forcedskin.com 账号以同步主题</p>
        <div class="login-form">
          <input id="loginUsername" type="text" placeholder="用户名" class="text-input" autocomplete="username" />
          <input id="loginPassword" type="password" placeholder="密码" class="text-input" autocomplete="current-password" />
          <button id="loginBtn" class="save-btn primary-btn" type="button">登录</button>
          <p id="loginError" class="login-error hidden"></p>
        </div>
      </section>

      <!-- 已登录：主题同步状态 -->
      <section id="syncSection" class="sync-section hidden">
        <div class="section-divider"></div>
        <p class="field-label">账号主题</p>
        <div class="theme-sync-row">
          <div class="theme-sync-item">
            <span class="theme-sync-label">☀️ 亮色</span>
            <span id="syncLightName" class="theme-sync-name">—</span>
          </div>
          <div class="theme-sync-item">
            <span class="theme-sync-label">🌙 暗色</span>
            <span id="syncDarkName" class="theme-sync-name">—</span>
          </div>
        </div>
        <button id="syncBtn" class="save-btn" type="button" style="margin-top:8px">同步主题配色</button>
      </section>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
