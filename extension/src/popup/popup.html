<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ForcedSkin</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <div class="shell">
      <header class="top-bar">
        <div class="brand">
          <img
            src="../LOGO.webp"
            alt=""
            class="brand-logo"
            width="28"
            height="28"
          />
          <span class="brand-name">ForcedSkin</span>
        </div>
        <div class="top-actions">
          <div id="headerUserBlock" class="header-user">
            <img
              id="headerAvatar"
              class="header-avatar hidden"
              alt=""
              crossorigin="anonymous"
            />
            <div
              id="headerAvatarFallback"
              class="header-avatar header-avatar--fallback"
              aria-hidden="true"
            ></div>
            <span
              id="headerUserName"
              class="header-user-name"
              data-i18n="guestNickname"
            ></span>
          </div>
          <button
            type="button"
            id="openSiteBtn"
            class="icon-btn"
            data-i18n-title="openOfficialSite"
          >
            <svg
              class="icon-svg"
              viewBox="0 0 24 24"
              aria-hidden="true"
              focusable="false"
            >
              <path
                fill="currentColor"
                d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"
              />
            </svg>
          </button>
        </div>
      </header>

      <nav class="tab-bar" role="tablist" aria-label="Main">
        <button
          type="button"
          role="tab"
          class="tab tab--active"
          data-tab="themes"
          aria-selected="true"
          id="tab-btn-themes"
          data-i18n="tabThemes"
        ></button>
        <button
          type="button"
          role="tab"
          class="tab"
          data-tab="whitelist"
          aria-selected="false"
          id="tab-btn-whitelist"
          data-i18n="tabWhitelist"
        ></button>
        <button
          type="button"
          role="tab"
          class="tab"
          data-tab="account"
          aria-selected="false"
          id="tab-btn-account"
          data-i18n="tabAccount"
        ></button>
      </nav>

      <main class="panels">
        <!-- 1 主题 -->
        <section
          id="panel-themes"
          class="tab-panel tab-panel--active"
          role="tabpanel"
          aria-labelledby="tab-btn-themes"
        >
          <p class="panel-lead" data-i18n="panelThemesLead"></p>

          <div class="mode-stack">
            <!-- 亮色：可展开 -->
            <div class="mode-block" id="modeBlockLight">
              <div class="mode-block__head">
                <label class="mode-block__radio">
                  <input type="radio" name="themeMode" value="light" />
                  <div class="mode-block__radio-body">
                    <span
                      class="mode-block__title"
                      data-i18n="optionLight"
                    ></span>
                    <!-- <span
                      class="mode-block__picked-label"
                      data-i18n="pickedPaletteLabel"
                    ></span> -->
                    <span
                      id="lightThemeName"
                      class="mode-block__picked-title"
                    ></span>
                    <!-- <span
                      id="lightThemeSlug"
                      class="mode-block__picked-id"
                    ></span> -->
                  </div>
                </label>
                <button
                  type="button"
                  class="mode-block__expand"
                  id="expandLightBtn"
                  aria-controls="lightSubPanel"
                  aria-expanded="false"
                  data-i18n-title="expandPickLight"
                >
                  <svg
                    class="mode-chevron"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                  >
                    <path fill="currentColor" d="M7 10l5 5 5-5z" />
                  </svg>
                </button>
              </div>
              <div id="lightSubPanel" class="mode-block__sub" hidden>
                <p class="sub-hint" data-i18n="pickLightTheme"></p>
                <div
                  id="lightThemeChips"
                  class="theme-grid"
                  role="listbox"
                ></div>
              </div>
            </div>

            <!-- 暗色：可展开 -->
            <div class="mode-block" id="modeBlockDark">
              <div class="mode-block__head">
                <label class="mode-block__radio">
                  <input type="radio" name="themeMode" value="dark" />
                  <div class="mode-block__radio-body">
                    <span
                      class="mode-block__title"
                      data-i18n="optionDark"
                    ></span>
                    <!-- <span
                      class="mode-block__picked-label"
                      data-i18n="pickedPaletteLabel"
                    ></span> -->
                    <span
                      id="darkThemeName"
                      class="mode-block__picked-title"
                    ></span>
                    <!-- <span
                      id="darkThemeSlug"
                      class="mode-block__picked-id"
                    ></span> -->
                  </div>
                </label>
                <button
                  type="button"
                  class="mode-block__expand"
                  id="expandDarkBtn"
                  aria-controls="darkSubPanel"
                  aria-expanded="false"
                  data-i18n-title="expandPickDark"
                >
                  <svg
                    class="mode-chevron"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                  >
                    <path fill="currentColor" d="M7 10l5 5 5-5z" />
                  </svg>
                </button>
              </div>
              <div id="darkSubPanel" class="mode-block__sub" hidden>
                <p class="sub-hint" data-i18n="pickDarkTheme"></p>
                <div
                  id="darkThemeChips"
                  class="theme-grid"
                  role="listbox"
                ></div>
              </div>
            </div>

            <!-- 自动：按本地时间 -->
            <label class="mode-block mode-block--auto">
              <div class="mode-block__head mode-block__head--simple">
                <input type="radio" name="themeMode" value="auto" />
                <div class="mode-block__radio-body">
                  <span class="mode-block__title" data-i18n="optionAuto"></span>
                  <span
                    class="mode-block__picked mode-block__picked--muted"
                    data-i18n="optionAutoSub"
                  ></span>
                </div>
              </div>
            </label>

            <!-- 不修改 -->
            <label class="mode-block mode-block--off">
              <div class="mode-block__head mode-block__head--simple">
                <input type="radio" name="themeMode" value="off" />
                <div class="mode-block__radio-body">
                  <span class="mode-block__title" data-i18n="optionOff"></span>
                  <span
                    class="mode-block__picked mode-block__picked--muted"
                    data-i18n="optionOffSub"
                  ></span>
                </div>
              </div>
            </label>
          </div>

          <p
            id="statusText"
            class="status status--toast hidden"
            aria-live="polite"
          ></p>
        </section>

        <!-- 2 白名单 -->
        <section
          id="panel-whitelist"
          class="tab-panel"
          role="tabpanel"
          aria-labelledby="tab-btn-whitelist"
          hidden
        >
          <p class="panel-lead" data-i18n="panelWhitelistLead"></p>
          <label
            class="field-label"
            for="whitelistTextarea"
            data-i18n="whitelistEditorLabel"
          ></label>
          <textarea
            id="whitelistTextarea"
            class="whitelist-textarea"
            spellcheck="false"
            rows="5"
            data-i18n-placeholder="whitelistPlaceholder"
          ></textarea>
          <p class="hint" data-i18n="whitelistHintComma"></p>
          <div class="button-row">
            <button
              id="saveWhitelistBtn"
              type="button"
              class="save-btn primary-btn"
              data-i18n="saveWhitelist"
            ></button>
          </div>

          <div class="whitelist-quick card-block">
            <p class="field-label" data-i18n="currentSite"></p>
            <p id="siteHostText" class="site-host">-</p>
            <p id="whitelistStateText" class="whitelist-state">-</p>
            <div class="button-row button-row--split">
              <button
                id="addWhitelistBtn"
                type="button"
                class="save-btn"
                data-i18n="addWhitelist"
              ></button>
              <button
                id="removeWhitelistBtn"
                type="button"
                class="save-btn danger"
                data-i18n="removeWhitelist"
              ></button>
            </div>
          </div>
          <p id="whitelistStatusToast" class="status status--sub"></p>
        </section>

        <!-- 3 账号 -->
        <section
          id="panel-account"
          class="tab-panel"
          role="tabpanel"
          aria-labelledby="tab-btn-account"
          hidden
        >
          <div id="accountGuest" class="account-guest">
            <p class="panel-lead" data-i18n="loginPrompt"></p>
            <button
              id="loginBtn"
              type="button"
              class="save-btn primary-btn"
              data-i18n="loginBtnOauth"
            ></button>
            <p id="loginError" class="login-error hidden"></p>
          </div>

          <div id="accountSignedIn" class="account-signed-in hidden">
            <div class="account-profile card-block">
              <img
                id="accountAvatar"
                class="account-avatar hidden"
                alt=""
                crossorigin="anonymous"
              />
              <div
                id="accountAvatarFallback"
                class="account-avatar account-avatar--lg account-avatar--fallback"
                aria-hidden="true"
              ></div>
              <div class="account-profile-text">
                <div id="accountDisplayName" class="account-name"></div>
                <div id="accountEmail" class="account-email"></div>
              </div>
            </div>

            <div class="card-block account-resource-block">
              <div class="account-section-head">
                <h2
                  class="account-section-title section-title"
                  data-i18n="accountMyThemesTitle"
                ></h2>
                <button
                  id="syncBtn"
                  type="button"
                  class="save-btn account-section-action"
                  data-i18n="syncBtn"
                ></button>
              </div>
              <div class="account-h-scroll" tabindex="0">
                <div
                  id="accountMyThemesStrip"
                  class="account-theme-strip"
                  role="list"
                ></div>
              </div>
            </div>

            <div class="card-block account-resource-block">
              <div class="account-section-head">
                <h2
                  class="account-section-title section-title"
                  data-i18n="accountAdaptersTitle"
                ></h2>
                <button
                  id="syncAdaptersBtn"
                  type="button"
                  class="save-btn account-section-action"
                  data-i18n="syncAdaptersBtn"
                ></button>
              </div>
              <div class="account-h-scroll" tabindex="0">
                <div
                  id="accountAdaptersStrip"
                  class="account-adapter-strip"
                  role="list"
                ></div>
              </div>
            </div>

            <button
              id="logoutBtn"
              type="button"
              class="save-btn danger account-logout"
              data-i18n="logoutTitle"
            ></button>
          </div>

          <p id="accountStatusText" class="status"></p>
        </section>
      </main>
    </div>
    <script src="./popup.js"></script>
  </body>
</html>
